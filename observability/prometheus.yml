global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'currentdao-backend'
    static_configs:
      - targets: ['host.docker.internal:9464'] # Assuming OTel Prometheus exporter is here
  - job_name: 'jaeger'
    static_configs:
      - targets: ['jaeger:14269'] # Jaeger handles its own prometheus metrics here
