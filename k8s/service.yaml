apiVersion: v1
kind: Service
metadata:
  name: currentdao-backend-service
  namespace: currentdao-prod
  labels:
    app: currentdao-backend
    environment: production
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/port: "3000"
    prometheus.io/path: "/metrics"
    service.beta.kubernetes.io/aws-load-balancer-type: "nlb"
    service.beta.kubernetes.io/aws-load-balancer-cross-zone-load-balancing-enabled: "true"
spec:
  type: LoadBalancer
  ports:
  - port: 80
    targetPort: 3000
    protocol: TCP
    name: http
  - port: 443
    targetPort: 3000
    protocol: TCP
    name: https
  selector:
    app: currentdao-backend
  sessionAffinity: None
---
apiVersion: v1
kind: Service
metadata:
  name: currentdao-backend-headless
  namespace: currentdao-prod
  labels:
    app: currentdao-backend
    environment: production
  annotations:
    service.beta.kubernetes.io/aws-load-balancer-type: "nlb"
spec:
  type: ClusterIP
  clusterIP: None
  ports:
  - port: 3000
    targetPort: 3000
    protocol: TCP
    name: http
  selector:
    app: currentdao-backend
---
apiVersion: v1
kind: Service
metadata:
  name: currentdao-backend-internal
  namespace: currentdao-prod
  labels:
    app: currentdao-backend
    environment: production
    service-type: internal
spec:
  type: ClusterIP
  ports:
  - port: 3000
    targetPort: 3000
    protocol: TCP
    name: http
  selector:
    app: currentdao-backend
