apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: currentdao-backend-hpa
  namespace: currentdao-prod
  labels:
    app: currentdao-backend
    environment: production
  annotations:
    autoscaling.alpha.kubernetes.io/conditions: "[]"
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: currentdao-backend
  minReplicas: 3
  maxReplicas: 50
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80
  - type: Pods
    pods:
      metric:
        name: http_requests_per_second
      target:
        type: AverageValue
        averageValue: "100"
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
      - type: Percent
        value: 10
        periodSeconds: 60
      - type: Pods
        value: 2
        periodSeconds: 60
      selectPolicy: Min
    scaleUp:
      stabilizationWindowSeconds: 60
      policies:
      - type: Percent
        value: 100
        periodSeconds: 15
      - type: Pods
        value: 10
        periodSeconds: 15
      selectPolicy: Max
---
apiVersion: autoscaling.k8s.io/v1
kind: VerticalPodAutoscaler
metadata:
  name: currentdao-backend-vpa
  namespace: currentdao-prod
  labels:
    app: currentdao-backend
    environment: production
spec:
  targetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: currentdao-backend
  updatePolicy:
    updateMode: "Auto"
  resourcePolicy:
    containerPolicies:
    - containerName: currentdao-backend
      minAllowed:
        cpu: 100m
        memory: 128Mi
      maxAllowed:
        cpu: 2
        memory: 2Gi
      controlledResources: ["cpu", "memory"]
