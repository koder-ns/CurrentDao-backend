apiVersion: networking.istio.io/v1beta1
kind: Gateway
metadata:
  name: currentdao-backend-gateway
  namespace: currentdao-prod
  labels:
    app: currentdao-backend
    environment: production
spec:
  selector:
    istio: ingressgateway
  servers:
  - port:
      number: 80
      name: http
      protocol: HTTP
    hosts:
    - api.currentdao.org
    - staging.api.currentdao.org
    tls:
      httpsRedirect: true
  - port:
      number: 443
      name: https
      protocol: HTTPS
    hosts:
    - api.currentdao.org
    - staging.api.currentdao.org
    tls:
      mode: SIMPLE
      credentialName: currentdao-tls
---
apiVersion: networking.istio.io/v1beta1
kind: VirtualService
metadata:
  name: currentdao-backend-vs
  namespace: currentdao-prod
  labels:
    app: currentdao-backend
    environment: production
spec:
  hosts:
  - api.currentdao.org
  - staging.api.currentdao.org
  gateways:
  - currentdao-backend-gateway
  http:
  - match:
    - uri:
        prefix: /api
    route:
    - destination:
        host: currentdao-backend-service
        port:
          number: 80
      weight: 100
    timeout: 30s
    retries:
      attempts: 3
      perTryTimeout: 10s
      retryOn: 5xx,gateway-error,connect-failure,refused-stream
    fault:
      delay:
        percentage:
          value: 0.1
        fixedDelay: 5s
  - match:
    - uri:
        exact: /health
    route:
    - destination:
        host: currentdao-backend-service
        port:
          number: 80
    timeout: 10s
  - match:
    - uri:
        exact: /ready
    route:
    - destination:
        host: currentdao-backend-service
        port:
          number: 80
    timeout: 10s
---
apiVersion: networking.istio.io/v1beta1
kind: DestinationRule
metadata:
  name: currentdao-backend-dr
  namespace: currentdao-prod
  labels:
    app: currentdao-backend
    environment: production
spec:
  host: currentdao-backend-service
  trafficPolicy:
    loadBalancer:
      simple: LEAST_CONN
    connectionPool:
      tcp:
        maxConnections: 100
      http:
        http1MaxPendingRequests: 50
        maxRequestsPerConnection: 10
    circuitBreaker:
      consecutiveErrors: 3
      interval: 30s
      baseEjectionTime: 30s
      maxEjectionPercent: 50
    outlierDetection:
      consecutiveErrors: 3
      interval: 30s
      baseEjectionTime: 30s
      maxEjectionPercent: 50
  subsets:
  - name: v1
    labels:
      version: v1
    trafficPolicy:
      loadBalancer:
        consistentHash:
          httpHeaderName: "x-user-id"
---
apiVersion: networking.istio.io/v1beta1
kind: ServiceEntry
metadata:
  name: currentdao-external-services
  namespace: currentdao-prod
  labels:
    app: currentdao-backend
    environment: production
spec:
  hosts:
  - horizon.stellar.org
  - rpc.mainnet.stellar.org
  location: MESH_EXTERNAL
  ports:
  - number: 443
    name: https
    protocol: HTTPS
  resolution: DNS
---
apiVersion: security.istio.io/v1beta1
kind: AuthorizationPolicy
metadata:
  name: currentdao-backend-authz
  namespace: currentdao-prod
  labels:
    app: currentdao-backend
    environment: production
spec:
  selector:
    matchLabels:
      app: currentdao-backend
  action: ALLOW
  rules:
  - from:
    - source:
        principals: ["cluster.local/ns/istio-system/sa/istio-ingressgateway-service-account"]
  - to:
    - operation:
        methods: ["GET", "POST", "PUT", "DELETE", "OPTIONS"]
  when:
  - key: request.auth.claims[role]
    values: ["admin", "user", "service"]
---
apiVersion: security.istio.io/v1beta1
kind: PeerAuthentication
metadata:
  name: currentdao-backend-peer-auth
  namespace: currentdao-prod
  labels:
    app: currentdao-backend
    environment: production
spec:
  selector:
    matchLabels:
      app: currentdao-backend
  mtls:
    mode: STRICT
---
apiVersion: security.istio.io/v1beta1
kind: RequestAuthentication
metadata:
  name: currentdao-backend-req-auth
  namespace: currentdao-prod
  labels:
    app: currentdao-backend
    environment: production
spec:
  selector:
    matchLabels:
      app: currentdao-backend
  jwtRules:
  - issuer: "https://currentdao.org/auth"
    jwksUri: "https://currentdao.org/auth/.well-known/jwks.json"
    forwardOriginalToken: true
---
apiVersion: telemetry.istio.io/v1beta1
kind: Telemetry
metadata:
  name: currentdao-backend-telemetry
  namespace: currentdao-prod
  labels:
    app: currentdao-backend
    environment: production
spec:
  selector:
    matchLabels:
      app: currentdao-backend
  metrics:
  - overrides:
    - match:
        metric: ALL_METRICS
      tagOverrides:
        destination_service:
          operation: REMOVE
        source_app:
          operation: REMOVE
  tracing:
  - sampling: 100
    custom_tags:
      user_id:
        header:
          name: "x-user-id"
          default_value: "anonymous"
  accessLogging:
  - providers:
    - name: envoy
    - name: otel
